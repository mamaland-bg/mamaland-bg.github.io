backend:
  name: github
  repo: mamaland-bg/mamaland-bg.github.io
  branch: main
  base_url: https://mamaland-auth.boyankiuranov.workers.dev
  site_domain: www.mamaland.bg

media_folder: public/images
public_folder: /images

site_url: https://www.mamaland.bg
display_url: https://www.mamaland.bg
logo_url: /favicon.svg

locale: bg

editor:
  preview: false

slug:
  encoding: ascii
  clean_accents: true

collections:
  - name: articles
    label: Статии
    label_singular: Статия
    folder: src/content/articles
    create: true
    delete: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    identifier_field: title
    summary: '{{draft | ternary("✏️ ЧЕРНОВА — ", "")}}{{title}} — {{date | date("DD.MM.YYYY")}}'
    sortable_fields: [date, title]
    view_filters:
      - label: Чернови
        field: draft
        pattern: true
      - label: Публикувани
        field: draft
        pattern: false
    fields:
      - name: draft
        label: Статус
        widget: select
        options:
          - { label: "✏️  Чернова (не се вижда на сайта)", value: true }
          - { label: "✅  Публикувана", value: false }
        default: true
        hint: "Смени на 'Публикувана' когато статията е готова"
      - { name: title, label: Заглавие, widget: string }
      - { name: excerpt, label: Кратко описание, widget: text, hint: "1-2 изречения — показва се в листинга и при споделяне" }
      - name: category
        label: Категория
        widget: select
        options:
          - { label: Имунитет, value: imunitet }
          - { label: Хранене, value: hranene }
          - { label: Развитие, value: razvitie }
          - { label: Психология, value: psihologia }
          - { label: Имунизации, value: imunizacii }
          - { label: Спешни ситуации, value: speshni }
          - { label: Общо, value: obshto }
      - { name: date, label: Дата на публикуване, widget: datetime, format: 'YYYY-MM-DD', date_format: 'DD.MM.YYYY', time_format: false, picker_utc: false }
      - { name: cover, label: Корица (снимка), widget: image, required: false, hint: "Препоръчителен размер 1200×900px, под 500KB" }
      - { name: coverAlt, label: Описание на корицата, widget: string, required: false, hint: "Накратко какво е на снимката — важно за достъпност" }
      - { name: author, label: Автор, widget: hidden, default: 'д-р Мерилин Иванова' }
      - { name: body, label: Съдържание, widget: markdown, hint: "Основният текст на статията. Използвай Наслов 2 (##) за подзаглавия." }

  - name: seminars
    label: Семинари
    label_singular: Семинар
    folder: src/content/seminars
    create: true
    delete: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    identifier_field: title
    summary: '{{draft | ternary("✏️ ЧЕРНОВА — ", "")}}{{title}} — {{date | date("DD.MM.YYYY")}}'
    sortable_fields: [date, title]
    view_filters:
      - label: Чернови
        field: draft
        pattern: true
      - label: Публикувани
        field: draft
        pattern: false
    fields:
      - name: draft
        label: Статус
        widget: select
        options:
          - { label: "✏️  Чернова (не се вижда на сайта)", value: true }
          - { label: "✅  Публикуван", value: false }
        default: true
        hint: "Смени на 'Публикуван' когато семинарът е готов за обявяване"
      - { name: title, label: Заглавие, widget: string }
      - { name: description, label: Кратко описание, widget: text, hint: "Едно-две изречения за какво ще е семинарът" }
      - { name: date, label: Начало (дата и час), widget: datetime, format: 'YYYY-MM-DDTHH:mm', date_format: 'DD.MM.YYYY', time_format: 'HH:mm', picker_utc: false }
      - { name: endDate, label: Край (по избор), widget: datetime, required: false, format: 'YYYY-MM-DDTHH:mm', date_format: 'DD.MM.YYYY', time_format: 'HH:mm', picker_utc: false }
      - { name: location, label: Място, widget: string, default: 'Медицински център Nuviva, София' }
      - { name: registrationPhone, label: Телефон за записване, widget: string, required: false, hint: "Напр. +359 88 123 4567" }
      - { name: registrationLink, label: Линк за записване онлайн, widget: string, required: false, hint: "Ако има — пълен адрес с https://" }
      - name: speakers
        label: Лектори
        widget: list
        required: false
        hint: "Добави лекторите ако са повече от един"
        field: { name: name, label: Име, widget: string }
      - { name: cover, label: Корица, widget: image, required: false }
      - { name: coverAlt, label: Описание на корицата, widget: string, required: false }
      - { name: body, label: Подробно описание, widget: markdown, hint: "Програма, теми, практическа информация — всичко което родителите трябва да знаят" }

  - name: settings
    label: Настройки на сайта
    editor:
      preview: false
    files:
      - name: home
        label: Начална страница — текстове
        file: src/data/home.json
        fields:
          - { name: heroEyebrow, label: Малък надпис над заглавието, widget: string, hint: "Показва се с главни букви над главното заглавие" }
          - { name: heroHeading, label: Главно заглавие (ръкописно), widget: string }
          - { name: heroSub, label: Подзаглавие, widget: string }
          - { name: heroLede, label: Уводен параграф, widget: text }
          - name: aboutPara1
            label: За нас — първи параграф
            widget: text
            hint: "Показва се в секцията 'За нас' на началната страница"
          - { name: aboutPara2, label: За нас — втори параграф, widget: text }
          - { name: newsletterHeading, label: Бюлетин — заглавие, widget: string }
          - { name: newsletterLede, label: Бюлетин — описание, widget: text }
          - { name: newsletterFinePrint, label: Бюлетин — дребен шрифт, widget: string }

      - name: contact
        label: Контакти
        file: src/data/contact.json
        fields:
          - { name: email, label: Имейл адрес, widget: string }
          - { name: instagramHandle, label: Instagram потребителско име, widget: string, hint: "Напр. @mamaland.sofia" }
          - { name: instagramUrl, label: Instagram линк, widget: string, hint: "Пълен адрес с https://" }
          - { name: phone, label: Телефон (за показване), widget: string, hint: "Напр. +359 89 999 9156" }
          - { name: phoneRaw, label: Телефон (за набиране), widget: string, hint: "Само цифри с + — напр. +35989999156" }
          - { name: clinicName, label: Наименование на клиниката, widget: string }
          - { name: clinicAddress, label: Адрес на клиниката, widget: string }
          - { name: disclaimer, label: Правна бележка, widget: text, hint: "Показва се в зелената кутия на страница Контакт" }

  - name: team
    label: Екип
    label_singular: Член на екипа
    folder: src/content/team
    create: true
    delete: false
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    identifier_field: name
    hint: "Профилите на екипа се показват на страница 'За нас'"
    fields:
      - { name: name, label: Пълно име, widget: string }
      - { name: role, label: Роля / Професия, widget: string, hint: "Напр. 'Педиатър и клиничен психолог'" }
      - { name: founder, label: Съосновател, widget: boolean, default: false, hint: "Маркирай ако е съосновател — ще се показва по-изпъкнало" }
      - { name: order, label: Подредба, widget: number, default: 99, value_type: int, hint: "По-малко число = по-напред. Мерилин е 1." }
      - { name: photo, label: Снимка, widget: image, required: false, hint: "Квадратна снимка, поне 400×400px" }
      - { name: photoAlt, label: Описание на снимката, widget: string, required: false }
      - { name: body, label: Биография, widget: markdown, hint: "Няколко абзаца — опит, мотивация, личен щрих" }
